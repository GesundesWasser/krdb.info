<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sections Admin Panel</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        color: #333;
      }
      input,
      textarea,
      select,
      button {
        margin: 5px 0;
        padding: 8px;
        width: 100%;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      table,
      th,
      td {
        border: 1px solid #ccc;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
      }
      tr:nth-child(even) {
        background: #eee;
      }
      .hidden {
        display: none;
      }
      .flex {
        display: flex;
        gap: 10px;
      }
      .flex button {
        width: auto;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <h1>Stadtadministration (Komisch/Verbuggt + Cheapahh)</h1>

    <div id="loginDiv">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p id="loginError" style="color: red"></p>
    </div>

    <div id="adminDiv" class="hidden">
      <button onclick="logout()">Logout</button>
      <h2>Create / Edit Section</h2>
      <input type="hidden" id="sectionId" />
      <input type="text" id="title" placeholder="Title" />
      <textarea id="description" placeholder="Description"></textarea>
      <input type="text" id="imgSrc" placeholder="Image Preview" disabled />
      <input
        type="file"
        id="imgFile"
        accept="image/*"
        onchange="uploadFile('imgFile', 'imgSrc', 'imgUploadStatus')"
      />
      <div class="upload-status" id="imgUploadStatus"></div>
      <input type="text" id="videoSrc" placeholder="Video Preview" disabled />
      <input
        type="file"
        id="videoFile"
        accept="video/*"
        onchange="uploadFile('videoFile', 'videoSrc', 'videoUploadStatus')"
      />
      <div class="upload-status" id="videoUploadStatus"></div>

      <input
        type="text"
        id="buttonText"
        placeholder="Button Text (leave blank for no button)"
      />
      <textarea
        id="buttonFn"
        placeholder="JavaScript Funktion"
        disabled
      ></textarea>

      <div class="flex">
        <button onclick="saveSection()">Save Section</button>
        <button onclick="clearForm()">Clear</button>
      </div>

      <h2>Existing Sections</h2>
      <table id="sectionsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <script>
      let token = "";

      // Login function
      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const res = await fetch("https://api.krdb.info/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok) {
          token = data.token;
          document.getElementById("loginDiv").classList.add("hidden");
          document.getElementById("adminDiv").classList.remove("hidden");
          loadSections();
        } else {
          document.getElementById("loginError").innerText = data.error;
        }
      }

      // Logout function
      function logout() {
        token = "";
        document.getElementById("adminDiv").classList.add("hidden");
        document.getElementById("loginDiv").classList.remove("hidden");
      }

      async function uploadFile(fileInputId, urlInputId, statusId) {
        const fileInput = document.getElementById(fileInputId);
        const statusEl = document.getElementById(statusId);
        const file = fileInput.files[0];
        if (!file) return;

        statusEl.textContent = "Uploading…";

        const formData = new FormData();
        formData.append("file", file);

        try {
          const res = await fetch("https://api.krdb.info/api/upload", {
            method: "POST",
            headers: { Authorization: "Bearer " + token },
            body: formData,
          });
          const data = await res.json();
          if (res.ok) {
            const url = data.url || "";
            document.getElementById(urlInputId).value = url;
            statusEl.textContent =
              "Datei wurde hochgeladen auf den Server: " + url;
          } else {
            statusEl.textContent = "Fehler beim hochladen :(";
          }
        } catch (err) {
          statusEl.textContent = "Netzwerk Fehler :(";
        }

        fileInput.value = "";
      }

      async function loadSections() {
        const res = await fetch("https://api.krdb.info/api/sections");
        const sections = await res.json();
        const tbody = document.querySelector("#sectionsTable tbody");
        tbody.innerHTML = "";
        sections.forEach((s) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${s.id}</td>
            <td>${s.title}</td>
            <td>${s.author}</td>
            <td>${s.date}</td>
            <td>
                <button onclick="editSection(${s.id})">Edit (ÄNDERT DATUM!)</button>
                <button onclick="deleteSection(${s.id})">Delete</button>
            </td>
        `;
          tbody.appendChild(tr);
        });
      }

      // Fill form for editing
      async function editSection(id) {
        const res = await fetch(`https://api.krdb.info/api/sections`);
        const sections = await res.json();
        const s = sections.find((x) => x.id === id);
        if (!s) return;
        document.getElementById("sectionId").value = s.id;
        document.getElementById("title").value = s.title;
        document.getElementById("description").value = s.description;
        document.getElementById("imgSrc").value = s.imgSrc;
        document.getElementById("videoSrc").value = s.videoSrc;
        document.getElementById("buttonText").value = s.button?.text || "";
        document.getElementById("buttonFn").value = s.button?.fn || "";
        const hasText = (s.button?.text || "").trim().length > 0;
        document.getElementById("buttonFn").disabled = !hasText;
      }

      async function saveSection() {
        const id = document.getElementById("sectionId").value;
        const text = document.getElementById("buttonText").value.trim();
        const fn = document.getElementById("buttonFn").value.trim();
        const section = {
          title: document.getElementById("title").value,
          description: document.getElementById("description").value,
          imgSrc: document.getElementById("imgSrc").value,
          videoSrc: document.getElementById("videoSrc").value,
          button: text ? { text, fn: fn || "" } : undefined,
        };

        const url = id
          ? `https://api.krdb.info/api/sections/${id}`
          : "https://api.krdb.info/api/sections";
        const method = id ? "PUT" : "POST";

        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          },
          body: JSON.stringify(section),
        });

        const data = await res.json();
        if (res.ok) {
          alert(data.message);
          clearForm();
          loadSections();
        } else {
          alert(data.error);
        }
      }

      // Delete section
      async function deleteSection(id) {
        if (!confirm("Are you sure you want to delete this section?")) return;
        const res = await fetch(`https://api.krdb.info/api/sections/${id}`, {
          method: "DELETE",
          headers: { Authorization: "Bearer " + token },
        });
        const data = await res.json();
        if (res.ok) {
          alert(data.message);
          loadSections();
        } else {
          alert(data.error);
        }
      }

      // Clear form
      function clearForm() {
        document.getElementById("buttonFn").disabled = true;
        document.getElementById("sectionId").value = "";
        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("imgSrc").value = "";
        document.getElementById("videoSrc").value = "";
        document.getElementById("buttonText").value = "";
        document.getElementById("buttonFn").value = "";
        document.getElementById("imgUploadStatus").textContent = "";
        document.getElementById("videoUploadStatus").textContent = "";
      }

      const buttonTextInput = document.getElementById("buttonText");
      const buttonFnInput = document.getElementById("buttonFn");
      buttonTextInput.addEventListener("input", () => {
        const hasText = buttonTextInput.value.trim().length > 0;
        buttonFnInput.disabled = !hasText;
        if (!hasText) buttonFnInput.value = "";
      });
    </script>
  </body>
</html>
