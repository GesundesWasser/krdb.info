<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sections Admin Panel</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    input, textarea, select, button { margin: 5px 0; padding: 8px; width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    table, th, td { border: 1px solid #ccc; }
    th, td { padding: 10px; text-align: left; }
    tr:nth-child(even) { background: #eee; }
    .hidden { display: none; }
    .flex { display: flex; gap: 10px; }
    .flex button { width: auto; flex: 1; }
</style>
</head>
<body>
<h1>Stadtadministration (Komisch/Verbuggt + Cheapahh)</h1>

<div id="loginDiv">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginError" style="color:red;"></p>
</div>

<div id="adminDiv" class="hidden">
    <button onclick="logout()">Logout</button>
    <h2>Create / Edit Section</h2>
    <input type="hidden" id="sectionId">
    <input type="text" id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="text" id="imgSrc" placeholder="Image URL">
    <input type="text" id="imgAlt" placeholder="Image Alt Text">
    <input type="text" id="videoSrc" placeholder="Video URL">
    <input type="text" id="videoType" placeholder="Video Type">
    <input type="text" id="buttonText" placeholder="Button Text">
    <input type="text" id="buttonLink" placeholder="Button Link">
    <label><input type="checkbox" id="showButton"> Show Button</label>
    <label><input type="checkbox" id="disabled"> Disabled</label>
    <div class="flex">
        <button onclick="saveSection()">Save Section</button>
        <button onclick="clearForm()">Clear</button>
    </div>

    <h2>Existing Sections</h2>
    <table id="sectionsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let token = "";

// Login function
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("https://api.krdb.info/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(res.ok){
        token = data.token;
        document.getElementById("loginDiv").classList.add("hidden");
        document.getElementById("adminDiv").classList.remove("hidden");
        loadSections();
    } else {
        document.getElementById("loginError").innerText = data.error;
    }
}

// Logout function
function logout() {
    token = "";
    document.getElementById("adminDiv").classList.add("hidden");
    document.getElementById("loginDiv").classList.remove("hidden");
}

// Load sections from backend
async function loadSections() {
    const res = await fetch("http://api.krdb.info/api/sections");
    const sections = await res.json();
    const tbody = document.querySelector("#sectionsTable tbody");
    tbody.innerHTML = "";
    sections.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${s.id}</td>
            <td>${s.title}</td>
            <td>${s.author}</td>
            <td>${s.date}</td>
            <td>
                <button onclick="editSection(${s.id})">Edit (ÄNDERT DATUM!)</button>
                <button onclick="deleteSection(${s.id})">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Fill form for editing
async function editSection(id) {
    const res = await fetch(`https://api.krdb.info/api/sections`);
    const sections = await res.json();
    const s = sections.find(x => x.id === id);
    if(!s) return;
    document.getElementById("sectionId").value = s.id;
    document.getElementById("title").value = s.title;
    document.getElementById("description").value = s.description;
    document.getElementById("imgSrc").value = s.imgSrc;
    document.getElementById("imgAlt").value = s.imgAlt;
    document.getElementById("videoSrc").value = s.videoSrc;
    document.getElementById("videoType").value = s.videoType;
    document.getElementById("buttonText").value = s.buttonText;
    document.getElementById("buttonLink").value = s.buttonLink;
    document.getElementById("showButton").checked = s.showButton;
    document.getElementById("disabled").checked = s.disabled;
}

// Save or update section
async function saveSection() {
    const id = document.getElementById("sectionId").value;
    const section = {
        title: document.getElementById("title").value,
        description: document.getElementById("description").value,
        imgSrc: document.getElementById("imgSrc").value,
        imgAlt: document.getElementById("imgAlt").value,
        videoSrc: document.getElementById("videoSrc").value,
        videoType: document.getElementById("videoType").value,
        buttonText: document.getElementById("buttonText").value,
        buttonLink: document.getElementById("buttonLink").value,
        showButton: document.getElementById("showButton").checked,
        disabled: document.getElementById("disabled").checked
    };

    const url = id ? `https://api.krdb.info/api/sections/${id}` : "https://api.krdb.info/api/sections";
    const method = id ? "PUT" : "POST";

    const res = await fetch(url, {
        method,
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(section)
    });

    const data = await res.json();
    if(res.ok){
        alert(data.message);
        clearForm();
        loadSections();
    } else {
        alert(data.error);
    }
}

// Delete section
async function deleteSection(id) {
    if(!confirm("Are you sure you want to delete this section?")) return;
    const res = await fetch(`https://api.krdb.info/api/sections/${id}`, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    if(res.ok){
        alert(data.message);
        loadSections();
    } else {
        alert(data.error);
    }
}

// Clear form
function clearForm() {
    document.getElementById("sectionId").value = "";
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("imgSrc").value = "";
    document.getElementById("imgAlt").value = "";
    document.getElementById("videoSrc").value = "";
    document.getElementById("videoType").value = "";
    document.getElementById("buttonText").value = "";
    document.getElementById("buttonLink").value = "";
    document.getElementById("showButton").checked = false;
    document.getElementById("disabled").checked = false;
}
</script>

</body>
</html>
